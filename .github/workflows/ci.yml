# Continuous Integration Workflow
# Runs on all pushes and pull requests to verify code quality

name: CI - Code Quality & Theme Validation

on:
  push:
    branches: [main, dev, development]
  pull_request:
    branches: [main, dev, development]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.27.0'

jobs:
  # Job 1: Lint and validate code quality
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint
        continue-on-error: false

      - name: Run Prettier check
        run: pnpm format:check

      - name: Validate JSON files
        run: |
          echo "Validating config/*.json files..."
          for file in config/*.json; do
            if [ -f "$file" ]; then
              echo "Checking $file"
              python3 -c "import json; json.load(open('$file'))" || exit 1
            fi
          done

          echo "Validating locales/*.json files..."
          for file in locales/*.json; do
            if [ -f "$file" ]; then
              echo "Checking $file"
              python3 -c "import json; json.load(open('$file'))" || exit 1
            fi
          done

          echo "All JSON files are valid!"

  # Job 2: Shopify theme validation
  theme-check:
    name: Shopify Theme Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Shopify Theme Check
        run: pnpm check
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}

  # Job 3: Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

  # Final job: Summary
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, theme-check, security]
    if: always()

    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.theme-check.result }}" != "success" ]; then
            echo "One or more CI checks failed"
            exit 1
          fi
          echo "All CI checks passed!"
